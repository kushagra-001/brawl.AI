<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brawl.AI - Fullscreen Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        .launch-btn {
            background: rgba(10,5,10,0.9); border: 2px solid #ff003c; padding: 30px 60px;
            font-family: 'Orbitron', sans-serif; font-size: 2.5rem; color: #fff; cursor: pointer;
            box-shadow: 0 0 50px rgba(255,0,60,0.5), inset 0 0 20px #ff003c;
            transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 5px;
            clip-path: polygon(30px 0, 100% 0, 100% calc(100% - 30px), calc(100% - 30px) 100%, 0 100%, 0 30px);
            position: relative;
        }
        .launch-btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg); transition: left 0.5s ease;
        }
        .launch-btn:hover::after { left: 200%; }
        .launch-btn:hover { background: #ff003c; color: #000; box-shadow: inset 0 0 50px rgba(255,255,255,0.8); border-color: #fff; }
        .wrapper { text-align: center; }
        .sys-msg { color: #00ff73; font-family: monospace; margin-top: 20px; text-shadow: 0 0 10px #00ff73; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="wrapper" id="start-screen">
        <button class="launch-btn" onclick="engageFullscreen()">ENGAGE FULLSCREEN ENGINE</button>
        <div class="sys-msg">Initializing True Persistence Bypass...</div>
    </div>
    
    <iframe id="game-frame"></iframe>

    <script>
        function engageFullscreen() {
            // Force true, unbreakable FullScreen on the Wrapper
            document.documentElement.requestFullscreen().catch(err => {
                console.warn(`Fullscreen error: ${err.message}`);
            });
            document.getElementById('start-screen').style.display = 'none';
            const frame = document.getElementById('game-frame');
            frame.style.display = 'block';
            
            // Load the entire game INSIDE the persistent Fullscreen wrapper!
            frame.src = 'index.html';
        }
    </script>
</body>
</html>
